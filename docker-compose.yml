version: '3.8'
services:
    app:
        build:
            context: .
            dockerfile: frontend/Dockerfile
        container_name: dspace-app
        platform: linux/arm64
        ports:
            - '3002:3002'
        environment:
            - NODE_ENV=production
            - PORT=3002
            - HOST=0.0.0.0
        restart: unless-stopped
        healthcheck:
            test: ["CMD", "curl", "-f", "http://localhost:3002/health"]
            interval: 30s
            timeout: 10s
            retries: 3
