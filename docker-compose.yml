version: '3.8'
services:
    app:
        build:
            context: .
            dockerfile: Dockerfile
        container_name: dspace-app
        platform: linux/arm64
        ports:
            - '8080:8080'
        environment:
            - NODE_ENV=production
            - PORT=8080
            - HOST=0.0.0.0
        restart: unless-stopped
        healthcheck:
            test: ["CMD", "curl", "-fsS", "http://localhost:8080/healthz"]
            interval: 30s
            timeout: 10s
            retries: 3
