apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "dspace.fullname" . }}
  labels:
    {{- include "dspace.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "dspace.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "dspace.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "dspace.serviceAccountName" . }}
      {{- if and .Values.podSecurityContext.enabled .Values.podSecurityContext }}
      securityContext:
        {{- toYaml (omit .Values.podSecurityContext "enabled") | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ include "dspace.name" . }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          env:
            - name: PORT
              value: "{{ .Values.service.port }}"
            - name: DSPACE_VERSION
              value: {{ .Values.image.tag | default .Chart.AppVersion | quote }}
            - name: DSPACE_ENV
              value: {{ .Values.environment | default "unknown" | quote }}
          {{- if .Values.env }}
            {{- toYaml .Values.env | nindent 12 }}
          {{- end }}
          {{- if and .Values.securityContext.enabled .Values.securityContext }}
          securityContext:
            {{- toYaml (omit .Values.securityContext "enabled") | nindent 12 }}
          {{- end }}
          {{- $hasConfig := and .Values.configMap.enabled (not (empty .Values.configMap.data)) }}
          {{- $hasSecret := and .Values.secret.enabled (not (empty .Values.secret.stringData)) }}
          {{- if or $hasConfig $hasSecret }}
          envFrom:
            {{- if $hasConfig }}
            - configMapRef:
                name: {{ include "dspace.fullname" . }}
            {{- end }}
            {{- if $hasSecret }}
            - secretRef:
                name: {{ include "dspace.fullname" . }}
            {{- end }}
          {{- end }}
          livenessProbe:
            httpGet:
              path: {{ .Values.probes.livenessPath }}
              port: http
            {{- with .Values.probes.liveness }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          readinessProbe:
            httpGet:
              path: {{ .Values.probes.readinessPath }}
              port: http
            {{- with .Values.probes.readiness }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
