name: link-check
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  lychee:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: lycheeverse/lychee-action@v1.9.0
        with:
          args: >-
            --accept 403,429
            --no-progress --verbose
            "**/*.md"
          fail: true
          format: markdown
          output: lychee/out.md
          jobSummary: true

