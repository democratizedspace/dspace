name: Quest Chart
on:
    push:
        branches: [v3]
    workflow_dispatch:

jobs:
    chart:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: 'npm'
                  cache-dependency-path: |
                      package-lock.json
                      frontend/package-lock.json
            - run: npm ci
            - run: cd frontend && npm ci
            - run: node scripts/generate-quest-chart.js
            - name: Commit chart
              run: |
                  git config user.name "github-actions"
                  git config user.email "actions@users.noreply.github.com"
                  if [ -n "$(git status --porcelain frontend/src/pages/docs/images/quest-tree-stats.png frontend/src/pages/docs/images/quest-tree-stats.txt)" ]; then
                    git add frontend/src/pages/docs/images/quest-tree-stats.png frontend/src/pages/docs/images/quest-tree-stats.txt
                    git commit -m "chore: update quest chart" && git push
                  fi
