name: Build and publish GHCR image

on:
  push:
    branches:
      - v3
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  image:
    name: Build and push image
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.tags.outputs.sha_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read package version
        id: version
        run: |
          version="$(node -p "require('./package.json').version")"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Define image tags
        id: tags
        run: |
          short_sha="$(git rev-parse --short HEAD)"
          sha_tag="ghcr.io/democratizedspace/dspace:v3-${short_sha}"
          latest_tag="ghcr.io/democratizedspace/dspace:v3-latest"
          version_tag="ghcr.io/democratizedspace/dspace:v${{ steps.version.outputs.version }}"
          echo "sha_tag=${sha_tag}" >> "$GITHUB_OUTPUT"
          echo "latest_tag=${latest_tag}" >> "$GITHUB_OUTPUT"
          echo "version_tag=${version_tag}" >> "$GITHUB_OUTPUT"

      - name: Set image metadata
        id: metadata
        env:
          REPO_URL: ${{ github.server_url }}/${{ github.repository }}
          GIT_SHA: ${{ github.sha }}
        run: |
          created="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          echo "created=${created}" >> "$GITHUB_OUTPUT"
          echo "source=${REPO_URL}" >> "$GITHUB_OUTPUT"
          echo "revision=${GIT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ steps.tags.outputs.sha_tag }}
            ${{ steps.tags.outputs.latest_tag }}
            ${{ steps.tags.outputs.version_tag }}
          labels: |
            org.opencontainers.image.source=${{ steps.metadata.outputs.source }}
            org.opencontainers.image.revision=${{ steps.metadata.outputs.revision }}
            org.opencontainers.image.created=${{ steps.metadata.outputs.created }}
          cache-from: type=registry,ref=ghcr.io/democratizedspace/dspace:v3-cache
          cache-to: type=registry,ref=ghcr.io/democratizedspace/dspace:v3-cache,mode=max
