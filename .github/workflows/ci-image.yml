name: Build and publish GHCR image

on:
  push:
    branches:
      - v3
      - main
  pull_request:
    branches:
      - v3
  workflow_dispatch:
    inputs:
      branch:
        description: Branch to build and publish the image from
        required: false
        default: v3
        type: choice
        options:
          - v3
          - main

permissions:
  contents: read
  packages: write
  actions: write

jobs:
  local-build:
    name: Validate Docker build with host node_modules
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies (creates host node_modules)
        run: pnpm install --frozen-lockfile --reporter=append-only

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image with local node_modules present (no cache on forks)
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: false
          platforms: linux/amd64
          provenance: false

      - name: Build image with local node_modules present
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: false
          platforms: linux/amd64
          provenance: false
          cache-from: type=gha,scope=ci-image-local
          cache-to: type=gha,mode=max,scope=ci-image-local
          load: true
          tags: dspace-test:latest

      - name: Build image for smoke test (no cache for forks)
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: false
          platforms: linux/amd64
          provenance: false
          load: true
          tags: dspace-test:latest

      - name: Smoke test - verify container boots and serves requests
        run: |
          # Start container in background with NODE_OPTIONS to show uncaught exceptions
          docker run -d --name dspace-smoke-test -p 127.0.0.1:8080:8080 \
            -e NODE_OPTIONS="--unhandled-rejections=warn" \
            dspace-test:latest

          get_body_and_code() {
            local url="$1"
            curl -s -w '\n%{http_code}' --max-time 5 "$url" 2>/dev/null || echo -e "\n000"
          }

          print_snapshot() {
            local attempt="$1"
            local config_code="$2"
            local health_code="$3"
            local root_code="$4"
            local config_body="$5"
            local health_body="$6"
            local root_body="$7"
            echo "=== Attempt ${attempt}: /config.json ${config_code}," \
              "/healthz ${health_code}, / ${root_code} ==="
            echo "--- Response body: /config.json (first 500 chars) ---"
            echo "$config_body" | head -c 500
            echo ""
            echo "--- Response body: /healthz (first 500 chars) ---"
            echo "$health_body" | head -c 500
            echo ""
            echo "--- Response body: / (first 500 chars) ---"
            echo "$root_body" | head -c 500
            echo ""
            echo "--- Container logs (tail) ---"
            docker logs dspace-smoke-test 2>&1 | tail -100
            echo "--- Node.js process info ---"
            docker exec dspace-smoke-test sh -c 'ps aux' 2>&1 || true
            echo "=== End debug output ==="
          }

          echo "Waiting for server to start..."
          SUCCESS=false

          for i in {1..60}; do
            CONFIG_RESPONSE=$(get_body_and_code http://127.0.0.1:8080/config.json)
            CONFIG_CODE=$(echo "$CONFIG_RESPONSE" | tail -n1)
            CONFIG_BODY=$(echo "$CONFIG_RESPONSE" | head -n -1)

            HEALTH_RESPONSE=$(get_body_and_code http://127.0.0.1:8080/healthz)
            HEALTH_CODE=$(echo "$HEALTH_RESPONSE" | tail -n1)
            HEALTH_BODY=$(echo "$HEALTH_RESPONSE" | head -n -1)

            ROOT_RESPONSE=$(get_body_and_code http://127.0.0.1:8080/)
            ROOT_CODE=$(echo "$ROOT_RESPONSE" | tail -n1)
            ROOT_BODY=$(echo "$ROOT_RESPONSE" | head -n -1)

            if [ "$CONFIG_CODE" = "200" ] || [ "$HEALTH_CODE" = "200" ]; then
              echo "Server responded successfully: /config.json ${CONFIG_CODE}," \
                "/healthz ${HEALTH_CODE}"
              echo "Response body (/config.json): $CONFIG_BODY"
              echo "Response body (/healthz): $HEALTH_BODY"
              SUCCESS=true
              break
            fi

            if [ "$i" -eq 5 ] || [ "$i" -eq 10 ] || [ "$i" -eq 30 ]; then
              print_snapshot "$i" "$CONFIG_CODE" "$HEALTH_CODE" "$ROOT_CODE" \
                "$CONFIG_BODY" "$HEALTH_BODY" "$ROOT_BODY"
            else
              echo "Attempt $i: /config.json ${CONFIG_CODE}, /healthz ${HEALTH_CODE}," \
                "/ ${ROOT_CODE}"
            fi

            if [ "$CONFIG_CODE" -ge 500 ] || [ "$HEALTH_CODE" -ge 500 ] || \
              [ "$ROOT_CODE" -ge 500 ]; then
              echo "Detected server error response; waiting for recovery..."
              echo "Bodies (truncated):"
              echo "/config.json:" && echo "$CONFIG_BODY" | head -c 500 && echo ""
              echo "/healthz:" && echo "$HEALTH_BODY" | head -c 500 && echo ""
              echo "/:" && echo "$ROOT_BODY" | head -c 500 && echo ""
            fi

            sleep 1
          done

          if [ "$SUCCESS" = "false" ]; then
            echo "=== Server health check failed after 60 seconds ==="
            echo "--- Full container logs ---"
            docker logs dspace-smoke-test 2>&1
            echo "--- Error lines from container logs ---"
            docker logs dspace-smoke-test 2>&1 | grep '"level":"error"' \
              | tail -50 || true
            echo "--- Final verbose curl response on /config.json ---"
            curl -v --max-time 5 http://127.0.0.1:8080/config.json 2>&1 || true
            echo "--- Test healthz endpoint ---"
            curl -v --max-time 5 http://127.0.0.1:8080/healthz 2>&1 || true
            echo "--- Test root endpoint ---"
            curl -v --max-time 5 http://127.0.0.1:8080/ 2>&1 || true
            docker stop dspace-smoke-test
            docker rm dspace-smoke-test
            exit 1
          fi

          echo "Testing root page..."
          ROOT_CODE=$(curl -s -o /dev/null -w '%{http_code}' --max-time 10 \
            http://127.0.0.1:8080/ 2>/dev/null || echo "000")
          if [ "$ROOT_CODE" != "200" ]; then
            echo "WARNING: Root page returned HTTP $ROOT_CODE instead of 200"
            echo "--- Root page response ---"
            curl -v --max-time 10 http://127.0.0.1:8080/ 2>&1 || true
            echo "NOTE: Basic runtime endpoints are responding; investigate SSR failures" \
              "separately."
          else
            echo "Root page is responding with HTTP 200!"
          fi

          docker stop dspace-smoke-test
          docker rm dspace-smoke-test
          echo "Smoke test passed!"

  image:
    name: Build and push image
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    outputs:
      image-tag: ${{ steps.tags.outputs.sha_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.branch || '' }}

      # Explicitly install the Node version from .nvmrc so version reads stay stable even if
      # runner defaults change.
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      # Use Node to read the app version from package.json for image tagging.
      - name: Read package version
        id: version
        run: |
          version="$(node -p "require('./package.json').version")"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Define image tags
        id: tags
        run: |
          branch="${{ github.event.inputs.branch || github.ref_name }}"
          short_sha="$(git rev-parse --short HEAD)"
          tag_prefix="${branch//\//-}"
          sha_tag="ghcr.io/democratizedspace/dspace:${tag_prefix}-${short_sha}"
          latest_tag="ghcr.io/democratizedspace/dspace:${tag_prefix}-latest"
          version_tag="ghcr.io/democratizedspace/dspace:v${{ steps.version.outputs.version }}"
          echo "sha_tag=${sha_tag}" >> "$GITHUB_OUTPUT"
          echo "latest_tag=${latest_tag}" >> "$GITHUB_OUTPUT"
          echo "version_tag=${version_tag}" >> "$GITHUB_OUTPUT"

      - name: Set image metadata
        id: metadata
        env:
          REPO_URL: ${{ github.server_url }}/${{ github.repository }}
          GIT_SHA: ${{ github.sha }}
        run: |
          created="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          echo "created=${created}" >> "$GITHUB_OUTPUT"
          echo "source=${REPO_URL}" >> "$GITHUB_OUTPUT"
          echo "revision=${GIT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          provenance: false
          tags: |
            ${{ steps.tags.outputs.sha_tag }}
            ${{ steps.tags.outputs.latest_tag }}
            ${{ steps.tags.outputs.version_tag }}
          labels: |
            org.opencontainers.image.source=${{ steps.metadata.outputs.source }}
            org.opencontainers.image.revision=${{ steps.metadata.outputs.revision }}
            org.opencontainers.image.created=${{ steps.metadata.outputs.created }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
