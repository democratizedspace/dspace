name: tests

on:
  push:
    branches: [v3]
  pull_request:

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          package-manager-cache: false

      - name: Enable pnpm via Corepack
        run: |
          corepack enable
          corepack prepare pnpm@9 --activate

      - name: Determine pnpm store path
        id: pnpm-store
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --reporter=append-only

      - name: Run lint and format checks
        run: pnpm --dir frontend run check

  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          package-manager-cache: false

      - name: Enable pnpm via Corepack
        run: |
          corepack enable
          corepack prepare pnpm@9 --activate

      - name: Determine pnpm store path
        id: pnpm-store
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --reporter=append-only

      - name: Run unit tests with coverage
        env:
          NODE_OPTIONS: --experimental-vm-modules
        run: npm run coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: frontend/coverage/lcov.info
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}

  e2e:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: ['1/2', '2/2']
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          package-manager-cache: false

      - name: Enable pnpm via Corepack
        run: |
          corepack enable
          corepack prepare pnpm@9 --activate

      - name: Determine pnpm store path
        id: pnpm-store
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --reporter=append-only

      - name: Build frontend + docs RAG with build SHA
        env:
          GIT_SHA: ${{ github.sha }}
        run: npm run build

      - name: Verify build stamp
        run: node scripts/verify-build-stamp.mjs

      - name: Guardrail - verify docs RAG gitSha is set
        run: |
          node -e "const m=require('./frontend/src/generated/rag/docs_meta.json'); if(!m.gitSha||m.gitSha==='unknown') process.exit(1);"

      - name: Setup Playwright environment
        run: pnpm --dir frontend run setup-test-env

      - name: Install Playwright runtime dependencies
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          set -euo pipefail
          sudo apt-get update

          if sudo apt-cache show libatk1.0-0t64 >/dev/null 2>&1; then
            packages=(
              libatk1.0-0t64
              libatk-bridge2.0-0t64
              libatspi2.0-0t64
              libcups2t64
              libgbm1
              libxkbcommon0
              libxcomposite1
              libxdamage1
              libxfixes3
              libxrandr2
              libasound2t64
            )
          else
            packages=(
              libatk1.0-0
              libatk-bridge2.0-0
              libatspi2.0-0
              libcups2
              libgbm1
              libxkbcommon0
              libxcomposite1
              libxdamage1
              libxfixes3
              libxrandr2
              libasound2
            )
          fi

          sudo apt-get install -y --no-install-recommends "${packages[@]}"

      - name: Install Playwright browsers and runtime dependencies
        run: sudo env "PATH=$PATH" pnpm --dir frontend exec playwright install --with-deps chromium chromium-headless-shell firefox webkit

      - name: Run Playwright tests (${{ matrix.shard }})
        working-directory: frontend
        run: npx playwright test --shard=${{ matrix.shard }} --reporter=dot
