name: tests

on:
  push:
    branches: [v3]
  pull_request:

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v2
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --reporter=append-only

      - name: Run lint and format checks
        run: pnpm --dir frontend run check

  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v2
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --reporter=append-only

      - name: Run unit tests with coverage
        env:
          NODE_OPTIONS: --experimental-vm-modules
        run: npm run coverage

      - name: Check patch coverage
        run: node scripts/checkPatchCoverage.cjs

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: frontend/coverage/lcov.info
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}

  e2e:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: ['1/2', '2/2']
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v2
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --reporter=append-only

      - name: Build frontend
        run: pnpm --dir frontend run build

      - name: Setup Playwright environment
        run: pnpm --dir frontend run setup-test-env

      - name: Install Playwright system dependencies
        working-directory: frontend
        run: sudo npx playwright install-deps

      - name: Install Playwright browsers
        run: pnpm --dir frontend exec playwright install

      - name: Run Playwright tests (${{ matrix.shard }})
        working-directory: frontend
        run: npx playwright test --shard=${{ matrix.shard }} --reporter=dot
