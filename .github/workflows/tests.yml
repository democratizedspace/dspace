name: tests

on:
  push:
    branches: [v3]
  pull_request:

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v2
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --reporter=append-only

      - name: Run lint and format checks
        run: pnpm --filter ./frontend run check

  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v2
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --reporter=append-only

      - name: Prepare shared assets
        run: node frontend/scripts/build-processes.mjs

      - name: Run unit tests with coverage
        env:
          NODE_OPTIONS: --experimental-vm-modules
        run: npm run coverage

      - name: Check patch coverage
        run: node scripts/checkPatchCoverage.cjs

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: frontend/coverage/lcov.info
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}

  e2e:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: ['1/2', '2/2']
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v2
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --reporter=append-only

      - name: Build frontend
        run: pnpm --filter ./frontend run build

      - name: Install Playwright browsers
        uses: microsoft/playwright-github-action@v1
        with:
          working-directory: frontend

      - name: Run Playwright tests
        working-directory: frontend
        env:
          SHARD: ${{ matrix.shard }}
        run: npx playwright test --shard=${SHARD} --reporter=dot
