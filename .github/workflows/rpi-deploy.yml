name: Build and Deploy to RPi

on:
  workflow_dispatch:
    inputs:
      GHCR_TOKEN:
        required: true
        description: 'Token for GHCR'
      RPI_HOST:
        required: true
        description: 'Pi host'
      RPI_USER:
        required: true
        description: 'SSH user'
      RPI_SSH_KEY:
        required: true
        description: 'SSH key'
  push:
    branches: [v3]

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      RPI_HOST: ${{ secrets.RPI_HOST }}
      RPI_USER: ${{ secrets.RPI_USER }}
      RPI_SSH_KEY: ${{ secrets.RPI_SSH_KEY }}
      GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Verify secrets
        run: |
          if [ -z "$GHCR_TOKEN" ] || [ -z "$RPI_HOST" ] || [ -z "$RPI_USER" ] || [ -z "$RPI_SSH_KEY" ]; then
            echo "Missing required secrets" && exit 1
          fi
      - name: Login to registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ env.GHCR_TOKEN }}
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          platforms: linux/arm64
          push: true
          tags: ghcr.io/${{ github.repository }}:latest
      - name: Deploy on Raspberry Pi
        # Only run this step if the Raspberry Pi host secret is set
        if: env.RPI_HOST != ''
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ env.RPI_HOST }}
          username: ${{ env.RPI_USER }}
          key: ${{ env.RPI_SSH_KEY }}
          script: |
            docker system prune -fa
            docker pull ghcr.io/${{ github.repository }}:latest
            docker compose -f /home/${{ env.RPI_USER }}/dspace/docker-compose.yml up -d app
