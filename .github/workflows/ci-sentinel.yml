name: ci-sentinel
on:
  pull_request:
  push:
    branches: [main]
jobs:
  ensure-tests-exist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          test -f .github/workflows/tests.yml
          test -f .github/workflows/ci.yml
          grep -q 'codecov/codecov-action@' .github/workflows/ci.yml

