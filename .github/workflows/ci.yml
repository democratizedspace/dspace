name: CI
on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json
      - run: npm ci
      - run: cd frontend && npm ci
      - run: npm run test:pr
      - uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: frontend/coverage
