name: CI
on:
  push:
    branches: [v3, main]
  pull_request:
    branches: [v3, main]

jobs:
  launch-gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm install
      - name: Run launch-gate checks
        run: |
          npm run lint
          npm run type-check
          npm run build
          npm test
          node scripts/link-check.mjs

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.0.0
          run_install: false
      - name: Determine pnpm store path
        id: pnpm-store
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path)" >> "$GITHUB_OUTPUT"
      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-
      - name: Install dependencies
        run: pnpm install --frozen-lockfile --reporter=append-only
      - name: Run tests with coverage
        run: pnpm run coverage
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: frontend/coverage/lcov.info
  docs-links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check documentation links
        uses: ./.github/actions/run-lychee
        with:
          version: '0.14.0'
          args: >-
            --accept 200,403,429,503
            --exclude "http://localhost"
            --no-progress --verbose
            "docs/**/*.md" "frontend/src/pages/docs/**/*.md"
          format: markdown
          output: lychee/out.md
  root-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.0.0
          run_install: false
      - name: Determine pnpm store path
        id: pnpm-store
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path)" >> "$GITHUB_OUTPUT"
      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-
      - name: Install dependencies
        run: pnpm install --frozen-lockfile --reporter=append-only
      - name: Run lint and type checks
        run: pnpm run check
      - name: Run root tests
        run: pnpm run test:root -- --testTimeout=20000

  frontend-indexeddb-regression-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.0.0
          run_install: false
      - name: Install dependencies
        run: pnpm install --frozen-lockfile --reporter=append-only
      - name: Setup Playwright environment
        run: pnpm --dir frontend run setup-test-env
      - name: Install Playwright Chromium
        run: pnpm --dir frontend exec playwright install chromium
      - name: Run IndexedDB regression Playwright spec
        working-directory: frontend
        run: npx playwright test e2e/indexeddb-availability.spec.ts --project=chromium --reporter=dot
