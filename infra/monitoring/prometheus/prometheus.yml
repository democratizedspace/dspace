global:
  scrape_interval: 15s

rule_files:
  - alerts.yml

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
  - job_name: 'dspace'
    static_configs:
      - targets: ['host.docker.internal:3002']
    authorization:
      type: Bearer
      credentials_file: /etc/prometheus/secrets/dspace_metrics_token
