apiVersion: apps/v1
kind: Deployment
metadata:
  name: dspace-app
spec:
  replicas: 2
  template:
    spec:
      containers:
        - name: dspace
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "8080"
            - name: HOST
              value: "0.0.0.0"
