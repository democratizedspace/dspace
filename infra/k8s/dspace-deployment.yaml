apiVersion: apps/v1
kind: Deployment
metadata:
  name: dspace-app
  labels:
    app: dspace-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dspace-app
  template:
    metadata:
      labels:
        app: dspace-app
    spec:
      containers:
      - name: dspace
        image: ghcr.io/democratizedspace/dspace:v3
        ports:
        - containerPort: 3002
        env:
        - name: NODE_ENV
          value: "production"
        - name: PORT
          value: "3002"
        - name: HOST
          value: "0.0.0.0"
        readinessProbe:
          httpGet:
            path: /health
            port: 3002
          initialDelaySeconds: 5
          periodSeconds: 10
