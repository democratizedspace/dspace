id: solar-basics
title: Solar Basics
tasks:
  - id: cut-extrusions
    title: "Cut & deburr twelve 20-series extrusions"
    body_md: |
      Use a chop saw or band saw to cut twelve pieces of 20‑series extrusion.
      Each length should be identical. File the edges so they are smooth.
    acceptance: "Twelve 300 mm extrusions deburred and ready."
    deps: []
    resources:
      - assets/svg/solar/step1.svg
    tags: [solar, mechanical]
  - id: square-frame
    title: "Square the cube & torque brackets to 6\u00A0N\u00B7m"
    body_md: |
      Join the extrusion lengths into a cube with corner brackets.
      Verify the cube is square before torquing bolts.
    acceptance: "Diagonals differ by \u22641\u00A0mm and all brackets tightened to 6\u00A0N\u00B7m."
    deps:
      - cut-extrusions
    resources:
      - assets/svg/solar/step2.svg
    tags: [solar, mechanical]
  - id: crimp-leads
    title: "Crimp MC4 leads and inline fuses (10× each)"
    body_md: |
      Prepare ten positive and negative leads. Crimp MC4 connectors and inline
      fuse holders on matching wires.
    acceptance: "Each lead shows <50\u00A0mV drop at 8\u00A0A after crimping."
    deps:
      - square-frame
    resources:
      - assets/svg/solar/step3.svg
    tags: [solar, wiring]
  - id: mount-enclosure
    title: "Mount IP65 isolator & ABS box; add PG7 glands"
    body_md: |
      Fasten the isolator and junction box to the frame. Install PG7 cable glands
      for weather‑proof wiring.
    acceptance: "Enclosures sealed; glands tightened to 3\u00A0N\u00B7m."
    deps:
      - crimp-leads
    resources:
      - assets/svg/solar/step4.svg
    tags: [solar, wiring]
  - id: commission
    title: "Commission MPPT → battery; verify \u2264\u00A050\u00A0mV drop @\u00A08\u00A0A"
    body_md: |
      Connect the panel array to the MPPT controller and charge a Group‑24
      battery. Measure voltage drop from controller to terminals.
    acceptance: "Battery charges with \u226450\u00A0mV drop at 8\u00A0A."
    deps:
      - mount-enclosure
    resources:
      - assets/svg/solar/step5.svg
    tags: [solar, power]
