replicaCount: 2
ingress:
  hosts:
    - host: int.dspace.local
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: dspace-int-tls
      hosts:
        - int.dspace.local
env:
  vars:
    DSPACE_FEATURE_FLAGS: beta-chat
  secretRefs:
    - name: dspace-int-secrets
      keys:
        METRICS_TOKEN: metrics-token
resources:
  requests:
    cpu: 200m
    memory: 384Mi
  limits:
    cpu: 750m
    memory: 768Mi
