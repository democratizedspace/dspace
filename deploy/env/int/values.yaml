env: int
replicaCount: 2
image:
  digest: sha256:83d6ac7e2a6f8c3a21d9130b35f6a4d8c9b52f3e174d0a5c6b8e2f0a1c3d4e5f
  # Swap to `tag` when tracking a moving integration image.
ingress:
  hosts:
    - host: int.dspace.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: dspace-int-tls
      hosts:
        - int.dspace.example.com
envVars:
  extra:
    - name: DSPACE_ENABLE_METRICS
      value: "1"
    - name: DSPACE_FEATURE_FLAGS
      value: beta-chat,balance-panel
metrics:
  enabled: true
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 4
  targetCPUUtilizationPercentage: 60
serviceMonitor:
  enabled: true
  namespaceSelector:
    matchNames:
      - dspace
