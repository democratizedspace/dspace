env: dev
replicaCount: 1
image:
  tag: main
  # For deterministic rollbacks swap `tag` for a digest reference instead.
ingress:
  hosts:
    - host: dev.dspace.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: dspace-dev-tls
      hosts:
        - dev.dspace.example.com
envVars:
  extra:
    - name: DSPACE_ENABLE_METRICS
      value: "0"
    - name: DSPACE_FEATURE_FLAGS
      value: beta-chat
metrics:
  enabled: false
serviceMonitor:
  enabled: false
