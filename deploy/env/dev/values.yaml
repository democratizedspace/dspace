replicaCount: 1
env: dev
image:
  # Dev builds iterate quickly; stick with a moving tag unless you need a digest pin.
  tag: latest
  digest: ""
metrics:
  enabled: false
ingress:
  hosts:
    - host: dev.dspace.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: dspace-dev-tls
      hosts:
        - dev.dspace.example.com
envVars:
  extra:
    - name: DSPACE_ENABLE_METRICS
      value: "0"
    - name: DSPACE_FEATURE_FLAGS
      value: beta-chat
serviceMonitor:
  enabled: false
