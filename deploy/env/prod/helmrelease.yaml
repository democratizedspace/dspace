apiVersion: helm.toolkit.fluxcd.io/v2beta2
kind: HelmRelease
metadata:
  name: dspace
  namespace: dspace
spec:
  interval: 15m
  chart:
    spec:
      chart: deploy/charts/dspace
      sourceRef:
        kind: GitRepository
        name: dspace
        namespace: flux-system
      version: 0.1.2
      reconcileStrategy: ChartVersion
  install:
    createNamespace: true
  upgrade:
    remediation:
      retries: 5
  valuesFrom:
    - kind: ConfigMap
      name: dspace-prod-values
      valuesKey: values.yaml
