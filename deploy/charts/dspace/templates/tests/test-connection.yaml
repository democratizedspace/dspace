apiVersion: v1
kind: Pod
metadata:
  name: {{ include "dspace.fullname" . }}-healthz-test
  labels:
    {{- include "dspace.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  containers:
    - name: curl
      image: curlimages/curl:8.11.1
      imagePullPolicy: IfNotPresent
      args:
        - -fsS
        - --retry
        - "5"
        - --retry-delay
        - "5"
        - http://{{ include "dspace.fullname" . }}:{{ .Values.service.port }}/healthz
  restartPolicy: Never
