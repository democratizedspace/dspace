apiVersion: v1
kind: Pod
metadata:
  name: {{ include "dspace.fullname" . }}-healthz
  labels:
    {{- include "dspace.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  containers:
    - name: curl
      image: curlimages/curl:8.8.0
      imagePullPolicy: IfNotPresent
      command:
        - /bin/sh
        - -c
        - |-
          set -euo pipefail
          for path in healthz livez; do
            code=$(curl -s -o /dev/null -w '%{http_code}' http://{{ include "dspace.fullname" . }}:{{ .Values.service.port }}/${path})
            test "$code" -eq 200
          done
