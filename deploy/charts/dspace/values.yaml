image:
  repository: ghcr.io/democratizedspace/dspace
  tag: ""
  pullPolicy: IfNotPresent
  shaTag: ""
imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

replicaCount: 1

strategy:
  type: RollingUpdate
  rollingUpdate:
    maxSurge: 1
    maxUnavailable: 0

service:
  type: ClusterIP
  port: 8080

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

env:
  # Plain key/value environment variables
  vars:
    NODE_ENV: production
    PORT: "8080"
    HOST: 0.0.0.0
  # Environment variables sourced from existing Secrets
  secretRefs: []
    # - name: dspace-secrets
    #   keys:
    #     METRICS_TOKEN: metrics-token

persistence:
  enabled: false
  accessModes:
    - ReadWriteOnce
  size: 1Gi
  storageClass: ""
  mountPath: /data

ingress:
  enabled: true
  className: traefik
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-dns01
  hosts:
    - host: dspace.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: dspace-tls
      hosts:
        - dspace.example.com

networkPolicy:
  enabled: true
  ingress:
    - namespaceSelector:
        matchLabels:
          k8s-app: traefik
  egress:
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 80
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
  additionalEgress: []

nodeSelector: {}
tolerations: []
affinity: {}

livenessProbe:
  path: /livez
  initialDelaySeconds: 10
  periodSeconds: 15
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  path: /healthz
  initialDelaySeconds: 10
  periodSeconds: 15
  timeoutSeconds: 5
  failureThreshold: 3

metrics:
  serviceMonitor:
    enabled: false
    interval: 30s
    scrapeTimeout: 10s
    additionalLabels: {}
