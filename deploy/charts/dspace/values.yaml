replicaCount: 1

image:
  repository: ghcr.io/democratizedspace/dspace
  digest: ""
  tag: ""
  pullPolicy: IfNotPresent

imagePullSecrets: []

nameOverride: ""
fullnameOverride: ""

env: dev

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext:
  enabled: true
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault

terminationGracePeriodSeconds: 30

strategy:
  type: RollingUpdate
  rollingUpdate:
    maxUnavailable: 0
    maxSurge: 1

securityContext:
  enabled: true
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  seccompProfile:
    type: RuntimeDefault
  capabilities:
    drop:
      - ALL

service:
  type: ClusterIP
  port: 8080
  targetPort: 8080
  metricsPort: 9464
  metricsTargetPort: 9464

metrics:
  enabled: true

ingress:
  enabled: true
  className: traefik
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-dns01
  hosts:
    - host: dspace.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: dspace-tls
      hosts:
        - dspace.example.com

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 300m
    memory: 256Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 60

nodeSelector: {}
tolerations: []
affinity: {}

runtimeEnv:
  standard:
    NODE_ENV: production
    HOST: 0.0.0.0
    PORT: "8080"
  extra: []

secretEnv:
  - name: METRICS_TOKEN
    secretName: dspace-secrets
    secretKey: metricsToken

persistence:
  enabled: false
  existingClaim: ""
  storageClass: longhorn
  accessModes:
    - ReadWriteOnce
  size: 1Gi
  mountPath: /app/data

serviceMonitor:
  enabled: false
  labels: { release: kube-prometheus-stack }
  namespaceSelector: {}
  interval: 30s
  path: /metrics
  port: metrics
  scrapeTimeout: ""
  metricRelabelings: []
  relabelings: []

alerts:
  enabled: false

networkPolicy:
  enabled: true
  traefikNamespace: traefik
  traefikSelector:
    app.kubernetes.io/name: traefik
  metricsScraper:
    enabled: true
    namespace: monitoring
    podSelector:
      app.kubernetes.io/name: prometheus
  extraIngress: []
  extraEgress: []
