replicaCount: 1

image:
  repository: ghcr.io/democratizedspace/dspace
  tag: ""
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext: {}

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: false
  runAsNonRoot: true

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

ingress:
  enabled: true
  className: traefik
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-dns01
  hosts:
    - host: dspace.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: dspace-tls
      hosts:
        - dspace.example.com

env:
  vars:
    NODE_ENV: production
    PORT: "8080"
    HOST: 0.0.0.0
  secrets: []

extraEnvFrom: []

persistence:
  enabled: false
  accessModes:
    - ReadWriteOnce
  size: 1Gi
  storageClass: null
  existingClaim: ""
  mountPath: /app/data

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 75

nodeSelector: {}

tolerations: []

affinity: {}

networkPolicy:
  enabled: true
  ingress:
    additional: []
    traefik:
      namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: traefik
      podSelector:
        matchLabels:
          app.kubernetes.io/name: traefik
  egress:
    allowDNS: true
    additional: []

serviceMonitor:
  enabled: false
  namespace: ""
  interval: 30s
  scrapeTimeout: 10s
  labels: {}
